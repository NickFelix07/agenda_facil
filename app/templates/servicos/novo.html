{% extends 'base.html' %}
{% block content %}
<h2>Novo Serviço</h2>
<form method="POST">
    <div class="mb-3"><label>Nome</label><input type="text" name="nome" class="form-control" required></div>
    <div class="mb-3"><label>Preço (R$)</label><input type="number" step="0.01" name="preco" class="form-control" required></div>
    <div class="mb-3"><label>Duração (minutos)</label><input type="number" name="duracao" class="form-control" required></div>
    <button type="submit" class="btn btn-primary">Salvar</button>
</form>
{% endblock %}
